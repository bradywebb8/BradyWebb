name: Site Health Check

on:
  schedule:
    - cron: '*/15 * * * *'  # runs every 15 minutes
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Ping site
        id: check
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://bradywebb8.github.io/BradyWebb/)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Site returned: $STATUS"

      - name: Open issue if site is down
        if: steps.check.outputs.status != '200'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.check.outputs.status }}';

            // Create label if it doesn't exist yet
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'site-down',
                color: 'd73a4a'
              });
            } catch (e) {}

            // Only open a new issue if one isn't already open
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'site-down'
            });

            if (existing.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Site down — HTTP ${status}`,
                body: [
                  `**bradywebb8.github.io/BradyWebb** returned HTTP **${status}**.`,
                  ``,
                  `Detected at: ${new Date().toUTCString()}`,
                  ``,
                  `Close this issue once the site is back up.`
                ].join('\n'),
                labels: ['site-down']
              });
            }
